name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run calculation tests
        run: |
          npm run test:finance-calculations
          npm run test:income-annualization
          npm run test:onboarding-progress
          npm run test:plaid-credit-mapping
          npm run test:recurring-bill-detection
